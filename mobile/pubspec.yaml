name: edulink_mobile
description: EduLink - Community-Driven Institutional Student Verification Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Routing
  go_router: ^13.2.0

  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.66.2
  google_fonts: ^6.1.0

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Utils
  intl: ^0.19.0
  json_annotation: ^4.8.1
  dartz: ^0.10.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
