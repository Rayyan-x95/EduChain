global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "educhain-api"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: "educhain-api"
          environment: "production"
    scrape_interval: 10s
